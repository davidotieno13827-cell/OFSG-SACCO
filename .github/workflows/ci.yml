name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . || true
      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --progress no || true
      - name: Run tests
        run: |
          python ofsg_platform/manage.py test --verbosity 2
