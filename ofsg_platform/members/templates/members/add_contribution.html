{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto card p-8">
    <h2 class="text-2xl font-bold mb-2 text-accent-navy">Record Contribution</h2>
    <p class="text-sm text-slate-600 mb-6">Capture a new contribution for a member using the SACCO record form.</p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block font-semibold text-slate-700 mb-2">Select Member</label>
            {{ form.member }}
        </div>
        <div>
            <label class="block font-semibold text-slate-700 mb-2">Amount (Ksh)</label>
            {{ form.amount }}
        </div>
        <div>
            <label class="block font-semibold text-slate-700 mb-2">Type</label>
            {{ form.contribution_type }}
        </div>
        <button type="submit" class="w-full brand-btn font-bold py-3 rounded-lg transition">Submit Record</button>
    </form>
</div>
{% endblock %}
