<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate your OFSG account</title>
  </head>
  <body style="font-family: sans-serif; color: #111">
    <h2>Hello {{ user.username }},</h2>
    <p>Thanks for registering at OFSG. Click the button below to activate your account:</p>
    <p><a href="{{ activation_link }}" style="display:inline-block;padding:10px 18px;background:#1f4f85;color:#fff;border-radius:6px;text-decoration:none">Activate account</a></p>
    <p>If the button doesn't work, open the following link:</p>
    <p><a href="{{ activation_link }}">{{ activation_link }}</a></p>
    <p>If you did not register, please ignore this email.</p>
  </body>
</html>
