<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OFSG SACCO member portal for contributions, fines, and profile management." />
    <title>OFSG Portal</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
    <nav class="nav-dark text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <a href="/members/" class="font-bold text-xl tracking-wide" style="display:flex;align-items:center;gap:.6rem;">
                <img src="{% static 'images/logo.svg' %}" alt="OFSG" style="height:40px;" />
                <span>OFSG Member Portal</span>
            </a>
            <div class="flex flex-wrap gap-3 text-sm">
                <a href="/members/" class="hover:text-blue-200">Home</a>
                {% if user.is_authenticated %}
                    <a href="/members/dashboard/" class="hover:text-blue-200">Dashboard</a>
                    <a href="/members/profile/" class="hover:text-blue-200">Profile</a>
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="hover:text-blue-200">Logout</button>
                    </form>
                {% else %}
                    <a href="/accounts/login/" class="brand-btn-secondary">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-7xl mx-auto px-6 pb-8 text-sm text-slate-500">
        <div class="border-t border-slate-300 pt-4">
            OFSG SACCO • Contributions, fines, nominations, and member support in one portal.
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('input[type="password"]').forEach(function (input) {
                if (input.closest('.password-wrapper')) {
                    return;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'password-wrapper';
                input.parentNode.insertBefore(wrapper, input);
                wrapper.appendChild(input);

                const toggle = document.createElement('button');
                toggle.type = 'button';
                toggle.className = 'password-toggle';
                toggle.setAttribute('aria-label', 'Show password');
                toggle.innerHTML = '👁';
                toggle.addEventListener('click', function () {
                    const isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    toggle.innerHTML = isPassword ? '🙈' : '👁';
                    toggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
                });

                wrapper.appendChild(toggle);
            });
        });
    </script>
</body>
</html>
